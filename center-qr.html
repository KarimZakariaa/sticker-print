<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>طباعة QR للمراكز</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #e6e6e6;
        color: #111;
      }

      body {
        padding: 14px;
      }

      .controls {
        max-width: 860px;
        margin: 0 auto 20px;
        padding: 16px 18px;
        border: 1px solid #b8b8b8;
        background: #fff;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      p {
        margin: 6px 0;
        line-height: 1.5;
      }

      .options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        font-size: 14px;
        font-weight: 700;
      }

      .field input,
      .field select {
        width: 100%;
        padding: 8px 10px;
        font: inherit;
        border: 1px solid #b8b8b8;
        background: #fff;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: 0;
        padding: 10px 14px;
        font: inherit;
        font-weight: 700;
        color: #fff;
        background: #17305a;
        cursor: pointer;
      }

      button.secondary {
        background: #4a4a4a;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .status {
        margin-top: 12px;
        font-weight: 700;
      }

      .hall-section {
        margin-top: 18px;
        border-top: 1px solid #d4d4d4;
        padding-top: 14px;
      }

      .hall-section h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      .hall-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }

      .hall-card {
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid #c8c8c8;
        border-radius: 4px;
        background: #fafafa;
      }

      .hall-title {
        font-size: 18px;
        font-weight: 700;
      }

      .hall-meta {
        display: grid;
        gap: 4px;
        font-size: 13px;
        line-height: 1.45;
      }

      .hall-ranges {
        direction: ltr;
        text-align: left;
      }

      .hall-pdf-button {
        width: 100%;
        padding: 8px 10px;
      }

      code {
        direction: ltr;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <section class="controls">
      <h1>طباعة QR للمراكز</h1>
      <p>
        اختر المركز لإنشاء QR.
        محتوى QR يكون بنفس صيغة <code>Square-Center-Hall-0001</code>.
      </p>

      <div class="options">
        <div class="field">
          <label for="boxNumber">المربع</label>
          <select id="boxNumber">
            <option value="A96">A96</option>
            <option value="B95">B95</option>
            <option value="C113">C113</option>
          </select>
        </div>
        <div class="field">
          <label for="centerNumber">المركز</label>
          <select id="centerNumber"></select>
        </div>
        <div class="field">
          <label for="totalNumber">إجمالي QR</label>
          <input type="number" id="totalNumber" min="0" step="1" value="0" readonly>
        </div>
      </div>

      <div class="actions">
        <button type="button" id="downloadCenterPdfButton">تحميل PDF للمركز</button>
        <button type="button" id="downloadHallPdfButton" class="secondary">تحميل PDF منفصل لكل صالة</button>
      </div>
      <div class="status" id="status"></div>

      <section class="hall-section" aria-labelledby="hallGridTitle">
        <h2 id="hallGridTitle">الصالات</h2>
        <div class="hall-grid" id="hallGrid"></div>
      </section>
    </section>

    <script src="qrcode.min.js"></script>
    <script src="data.js"></script>
    <script>
      const CENTER_GROUPS_BY_BOX = {
        A96: ["54", "55", "56"],
        B95: ["50", "51", "52", "53"],
        C113: ["46", "47", "48", "49"],
      };
      const STORAGE_KEY = "center-qr-print-settings";
      const RENDER_BATCH_SIZE = 100;
      const MM_TO_PT = 72 / 25.4;
      const PAGE_SIZE_MM = 30;
      const SEQUENCE_DIGITS = 4;
      const QR_SCAN_PREFIX = "https://app.madarapp.com/scan?qrCode=";
      const collator = new Intl.Collator("en", {
        numeric: true,
        sensitivity: "base",
      });

      const boxInput = document.getElementById("boxNumber");
      const centerInput = document.getElementById("centerNumber");
      const totalInput = document.getElementById("totalNumber");
      const status = document.getElementById("status");
      const hallGrid = document.getElementById("hallGrid");
      const downloadCenterPdfButton = document.getElementById("downloadCenterPdfButton");
      const downloadHallPdfButton = document.getElementById("downloadHallPdfButton");

      let hallRows = [];

      function setBusy(isBusy) {
        downloadCenterPdfButton.disabled = isBusy;
        downloadHallPdfButton.disabled = isBusy;
        hallGrid.querySelectorAll(".hall-pdf-button").forEach((button) => {
          button.disabled = isBusy;
        });
      }

      function getAvailableCentersForBox(boxNumber) {
        const availableCenters = new Set(
          hallRows.map((row) => String(row.Center))
        );

        return (CENTER_GROUPS_BY_BOX[boxNumber] || []).filter((center) =>
          availableCenters.has(center)
        );
      }

      function getHallGroupsForCenter(centerNumber) {
        const groupsByHall = new Map();

        hallRows
          .filter((row) => String(row.Center) === String(centerNumber))
          .sort((left, right) => {
            const hallComparison = collator.compare(left.Hall, right.Hall);
            return hallComparison || left.Start - right.Start;
          })
          .forEach((row) => {
            const range = {
              square: String(row.Square),
              center: String(row.Center),
              hall: String(row.Hall),
              start: Number(row.Start),
              end: Number(row.End),
            };
            const existing = groupsByHall.get(range.hall);

            if (existing) {
              existing.ranges.push(range);
              existing.minStart = Math.min(existing.minStart, range.start);
              existing.maxEnd = Math.max(existing.maxEnd, range.end);
              existing.total += range.end - range.start + 1;
              return;
            }

            groupsByHall.set(range.hall, {
              square: range.square,
              center: range.center,
              hall: range.hall,
              ranges: [range],
              minStart: range.start,
              maxEnd: range.end,
              total: range.end - range.start + 1,
            });
          });

        return Array.from(groupsByHall.values()).sort((left, right) =>
          collator.compare(left.hall, right.hall)
        );
      }

      function updateTotalForCenter() {
        const hallGroups = getHallGroupsForCenter(centerInput.value);
        const qrCount = hallGroups.reduce(
          (total, hallGroup) => total + hallGroup.total,
          0
        );

        totalInput.value = qrCount;
        renderHallGrid(hallGroups);
        status.textContent =
          hallGroups.length > 0
            ? `تم اختيار ${hallGroups.length.toLocaleString()} صالة، بإجمالي ${qrCount.toLocaleString()} QR.`
            : "لا توجد صالات لهذا المركز.";
      }

      function formatHallRanges(hallGroup) {
        return hallGroup.ranges
          .map((range) =>
            `${range.square}-${range.center}-${range.hall}: ` +
            `${range.start.toLocaleString()} - ${range.end.toLocaleString()}`
          )
          .join(" | ");
      }

      function renderHallGrid(hallGroups) {
        hallGrid.innerHTML = "";

        if (hallGroups.length === 0) {
          const emptyMessage = document.createElement("p");
          emptyMessage.textContent = "لا توجد صالات لعرضها.";
          hallGrid.appendChild(emptyMessage);
          return;
        }

        const fragment = document.createDocumentFragment();

        hallGroups.forEach((hallGroup) => {
          const card = document.createElement("article");
          card.className = "hall-card";

          const title = document.createElement("div");
          title.className = "hall-title";
          title.textContent = hallGroup.hall;

          const meta = document.createElement("div");
          meta.className = "hall-meta";

          const square = document.createElement("div");
          square.textContent = `المربع: ${hallGroup.square}`;

          const count = document.createElement("div");
          count.textContent = `عدد QR: ${hallGroup.total.toLocaleString()}`;

          const ranges = document.createElement("div");
          ranges.className = "hall-ranges";
          ranges.textContent = formatHallRanges(hallGroup);

          const button = document.createElement("button");
          button.type = "button";
          button.className = "hall-pdf-button";
          button.dataset.hall = hallGroup.hall;
          button.textContent = "تحميل PDF";

          meta.append(square, count, ranges);
          card.append(title, meta, button);
          fragment.appendChild(card);
        });

        hallGrid.appendChild(fragment);
      }

      function updateCenterOptions(preferredValue = "") {
        const centers = getAvailableCentersForBox(boxInput.value);
        centerInput.innerHTML = "";

        centers.forEach((center) => {
          const option = document.createElement("option");
          option.value = center;
          option.textContent = center;
          centerInput.appendChild(option);
        });

        if (centers.includes(preferredValue)) {
          centerInput.value = preferredValue;
        }

        updateTotalForCenter();
      }

      function getSettings() {
        if (hallRows.length === 0) {
          throw new Error("جاري تحميل بيانات الصالات.");
        }

        const hallGroups = getHallGroupsForCenter(centerInput.value);

        if (hallGroups.length === 0) {
          throw new Error("لا توجد صالات لهذا المركز.");
        }

        const totalNumber = hallGroups.reduce(
          (total, hallGroup) => total + hallGroup.total,
          0
        );

        return {
          boxNumber: boxInput.value,
          centerNumber: centerInput.value,
          totalNumber,
          count: totalNumber,
          hallGroups,
        };
      }

      function formatQrValue(range, sequence) {
        const qrCode = `${range.square}-${range.center}-${range.hall}-${String(sequence).padStart(SEQUENCE_DIGITS, "0")}`;
        return `${QR_SCAN_PREFIX}${qrCode.replace(/\s+/g, "")}`;
      }

      function forEachHallSequence(hallGroup, callback) {
        hallGroup.ranges.forEach((range) => {
          for (let sequence = range.start; sequence <= range.end; sequence += 1) {
            callback(range, sequence);
          }
        });
      }

      function saveSettings() {
        const payload = {
          boxNumber: boxInput.value,
          centerNumber: centerInput.value,
        };

        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      }

      function restoreSettings() {
        const raw = localStorage.getItem(STORAGE_KEY);

        if (!raw) {
          updateCenterOptions();
          return;
        }

        try {
          const saved = JSON.parse(raw);

          if (saved.boxNumber && CENTER_GROUPS_BY_BOX[saved.boxNumber]) {
            boxInput.value = saved.boxNumber;
          }

          updateCenterOptions(saved.centerNumber);
        } catch (error) {
          localStorage.removeItem(STORAGE_KEY);
          updateCenterOptions();
        }
      }

      function mm(value) {
        return value * MM_TO_PT;
      }

      function pdfNumber(value) {
        return Number(value.toFixed(3)).toString();
      }

      function pdfPoint(value) {
        return pdfNumber(mm(value));
      }

      function createQrMatrix(value) {
        const qr = qrcode(0, "M");
        qr.addData(value, "Byte");
        qr.make();

        return {
          size: qr.getModuleCount(),
          isDark: (row, column) => qr.isDark(row, column),
        };
      }

      function createPdfPage(value) {
        const qr = createQrMatrix(value);
        const moduleSize = PAGE_SIZE_MM / qr.size;
        const pageHeight = pdfPoint(PAGE_SIZE_MM);
        const commands = [
          "q",
          `1 0 0 -1 0 ${pageHeight} cm`,
          "1 1 1 rg",
          `0 0 ${pdfPoint(PAGE_SIZE_MM)} ${pdfPoint(PAGE_SIZE_MM)} re`,
          "f",
          "0 0 0 rg",
        ];

        for (let row = 0; row < qr.size; row += 1) {
          for (let column = 0; column < qr.size; column += 1) {
            if (qr.isDark(row, column)) {
              commands.push(
                `${pdfPoint(column * moduleSize)} ${pdfPoint(row * moduleSize)} ` +
                `${pdfPoint(moduleSize)} ${pdfPoint(moduleSize)} re`
              );
            }
          }
        }

        commands.push("f", "Q");

        return commands.join("\n");
      }

      function createPdfDocument(pageContents) {
        const pageSize = pdfPoint(PAGE_SIZE_MM);
        const objectCount = 2 + pageContents.length * 2;
        const objects = new Array(objectCount + 1);
        const pageRefs = pageContents
          .map((_, index) => `${3 + index * 2} 0 R`)
          .join(" ");

        objects[1] = "<< /Type /Catalog /Pages 2 0 R >>";
        objects[2] = `<< /Type /Pages /Kids [${pageRefs}] /Count ${pageContents.length} >>`;

        pageContents.forEach((content, index) => {
          const pageObjectId = 3 + index * 2;
          const contentObjectId = pageObjectId + 1;
          objects[pageObjectId] =
            `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageSize} ${pageSize}] /Contents ${contentObjectId} 0 R >>`;
          objects[contentObjectId] =
            `<< /Length ${content.length} >>\nstream\n${content}\nendstream`;
        });

        let pdf = "%PDF-1.4\n";
        const offsets = [0];

        for (let objectId = 1; objectId < objects.length; objectId += 1) {
          offsets[objectId] = pdf.length;
          pdf += `${objectId} 0 obj\n${objects[objectId]}\nendobj\n`;
        }

        const xrefOffset = pdf.length;
        pdf += `xref\n0 ${objects.length}\n`;
        pdf += "0000000000 65535 f \n";

        for (let objectId = 1; objectId < objects.length; objectId += 1) {
          pdf += `${String(offsets[objectId]).padStart(10, "0")} 00000 n \n`;
        }

        pdf +=
          `trailer\n<< /Size ${objects.length} /Root 1 0 R >>\n` +
          `startxref\n${xrefOffset}\n%%EOF`;

        return new Blob([pdf], { type: "application/pdf" });
      }

      function downloadBlob(blob, fileName) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 0);
      }

      async function createPageContentsForHallGroups(hallGroups, onProgress) {
        const pageContents = [];
        const total = hallGroups.reduce(
          (sum, hallGroup) => sum + hallGroup.total,
          0
        );
        let completed = 0;

        for (const hallGroup of hallGroups) {
          forEachHallSequence(hallGroup, (range, sequence) => {
            pageContents.push(createPdfPage(formatQrValue(range, sequence)));
            completed += 1;
          });

          onProgress(completed, total);
          await new Promise((resolve) => requestAnimationFrame(resolve));
        }

        return pageContents;
      }

      function getHallPdfFileName(hallGroup) {
        return (
          `center-qr-${hallGroup.square}-${hallGroup.center}-${hallGroup.hall}-` +
          `${hallGroup.minStart}-${hallGroup.maxEnd}.pdf`
        );
      }

      async function downloadSingleHallPdf(hallGroup) {
        const fileName = getHallPdfFileName(hallGroup);

        setBusy(true);
        status.textContent = `جاري إنشاء PDF للصالة ${hallGroup.hall}...`;

        try {
          const pageContents = await createPageContentsForHallGroups(
            [hallGroup],
            (completed, total) => {
              status.textContent =
                `جاري إنشاء PDF للصالة ${hallGroup.hall}... ` +
                `${completed.toLocaleString()} من ${total.toLocaleString()} مكتمل.`;
            }
          );

          downloadBlob(createPdfDocument(pageContents), fileName);
          saveSettings();
          status.textContent = `تم تحميل ${fileName}.`;
        } finally {
          setBusy(false);
        }
      }

      async function downloadCenterPdf() {
        const settings = getSettings();
        const fileName = `center-qr-center-${settings.centerNumber}.pdf`;

        setBusy(true);
        status.textContent = `جاري إنشاء PDF واحد للمركز ${settings.centerNumber}...`;

        try {
          const pageContents = await createPageContentsForHallGroups(
            settings.hallGroups,
            (completed, total) => {
              status.textContent =
                `جاري إنشاء PDF واحد للمركز ${settings.centerNumber}... ` +
                `${completed.toLocaleString()} من ${total.toLocaleString()} مكتمل.`;
            }
          );

          downloadBlob(createPdfDocument(pageContents), fileName);
          saveSettings();
          status.textContent = `تم تحميل ${fileName}.`;
        } finally {
          setBusy(false);
        }
      }

      async function downloadHallPdfs() {
        const settings = getSettings();
        let completedHalls = 0;

        setBusy(true);
        status.textContent =
          `جاري إنشاء ${settings.hallGroups.length.toLocaleString()} ملفات PDF للمركز ${settings.centerNumber}...`;

        try {
          for (const hallGroup of settings.hallGroups) {
            const fileName = getHallPdfFileName(hallGroup);
            const pageContents = await createPageContentsForHallGroups(
              [hallGroup],
              (completed, total) => {
                status.textContent =
                  `جاري إنشاء PDF للصالة ${hallGroup.hall}... ` +
                  `${completed.toLocaleString()} من ${total.toLocaleString()} مكتمل.`;
              }
            );

            downloadBlob(createPdfDocument(pageContents), fileName);
            completedHalls += 1;
            status.textContent =
              `تم إنشاء ${completedHalls.toLocaleString()} من ` +
              `${settings.hallGroups.length.toLocaleString()} ملفات PDF للمركز ${settings.centerNumber}.`;
            await new Promise((resolve) => requestAnimationFrame(resolve));
          }

          saveSettings();
          status.textContent =
            `تم تحميل ${settings.hallGroups.length.toLocaleString()} ملفات PDF للصالات في المركز ${settings.centerNumber}.`;
        } finally {
          setBusy(false);
        }
      }

      function normalizeHallRows(rows) {
        return rows
            .map((row) => ({
              Square: String(row.Square),
              Center: String(row.Center),
              Hall: String(row.Hall),
              Start: Number(row.Start),
              End: Number(row.End),
            }))
            .filter((row) =>
              row.Square &&
              row.Center &&
              row.Hall &&
              Number.isInteger(row.Start) &&
              Number.isInteger(row.End) &&
              row.Start <= row.End
            );
      }

      async function loadHallData() {
        setBusy(true);
        status.textContent = "جاري تحميل بيانات الصالات...";

        try {
          let rows = Array.isArray(window.CENTER_QR_DATA)
            ? window.CENTER_QR_DATA
            : null;

          if (!rows) {
            if (window.location.protocol === "file:") {
              throw new Error("تعذر تحميل data.js. تأكد أن الملف موجود بجانب center-qr.html.");
            }

            const response = await fetch("data.json", { cache: "no-store" });

            if (!response.ok) {
              throw new Error(`تعذر تحميل data.json (${response.status}).`);
            }

            rows = await response.json();
          }

          hallRows = normalizeHallRows(rows);

          if (hallRows.length === 0) {
            throw new Error("ملف data.json لا يحتوي على نطاقات صالات صحيحة.");
          }

          restoreSettings();
          saveSettings();
        } catch (error) {
          status.textContent = error.message;
        } finally {
          setBusy(false);
        }
      }

      boxInput.addEventListener("change", () => {
        updateCenterOptions();
        saveSettings();
      });

      centerInput.addEventListener("change", () => {
        updateTotalForCenter();
        saveSettings();
      });

      hallGrid.addEventListener("click", (event) => {
        const button = event.target.closest(".hall-pdf-button");

        if (!button) {
          return;
        }

        const hallGroup = getHallGroupsForCenter(centerInput.value).find(
          (group) => group.hall === button.dataset.hall
        );

        if (!hallGroup) {
          status.textContent = "تعذر العثور على بيانات هذه الصالة.";
          return;
        }

        downloadSingleHallPdf(hallGroup).catch((error) => {
          status.textContent = error.message;
          setBusy(false);
        });
      });

      downloadCenterPdfButton.addEventListener("click", () => {
        downloadCenterPdf().catch((error) => {
          status.textContent = error.message;
          setBusy(false);
        });
      });

      downloadHallPdfButton.addEventListener("click", () => {
        downloadHallPdfs().catch((error) => {
          status.textContent = error.message;
          setBusy(false);
        });
      });

      loadHallData();
    </script>
  </body>
</html>
