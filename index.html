<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GAMA Baggage Sticker Print</title>
    <style>
      :root {
        --label-width: 54mm;
        --label-height: 300mm;
        --shell-inset-x: 0.25mm;
        --shell-inset-y: 1.8mm;
        --shell-border: 0.25mm;
        --outer-radius: 2.5mm;
        --inner-radius: 2.1mm;
        --panel-width: 50mm;
        --panel-height: 56mm;
        --panel-top: 110mm;
        --qr-size: 44mm;
        --cut-top: 43mm;
        --cut-bottom: 50mm;
        --outer-color: #f6f4aa;
        --inner-color: #ef0707;
        --inner-border: #17305a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #e6e6e6;
        color: #111;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      body {
        padding: 14px;
      }

      .controls {
        max-width: 920px;
        margin: 0 auto 20px;
        padding: 16px 18px;
        border: 1px solid #b8b8b8;
        background: #fff;
      }

      .controls h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      .controls p {
        margin: 6px 0;
        line-height: 1.5;
      }

      .options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        font-size: 14px;
        font-weight: 700;
      }

      .field input {
        width: 100%;
        padding: 8px 10px;
        font: inherit;
        border: 1px solid #b8b8b8;
      }

      .field select {
        width: 100%;
        padding: 8px 10px;
        font: inherit;
        border: 1px solid #b8b8b8;
        background: #fff;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: 0;
        padding: 10px 14px;
        font: inherit;
        font-weight: 700;
        color: #fff;
        background: #17305a;
        cursor: pointer;
      }

      .button-link {
        display: inline-flex;
        align-items: center;
        padding: 10px 14px;
        font: inherit;
        font-weight: 700;
        color: #fff;
        text-decoration: none;
      }

      button.secondary,
      .button-link.secondary {
        background: #4a4a4a;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .status {
        margin-top: 12px;
        font-weight: 700;
      }

      .sheet {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
      }

      .sticker {
        position: relative;
        width: var(--label-width);
        height: var(--label-height);
        page-break-after: always;
        break-after: page;
        overflow: hidden;
        background: var(--outer-color);
        border-radius: var(--outer-radius);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.06);
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .sticker:last-child {
        page-break-after: auto;
        break-after: auto;
      }

      .sticker-shell {
        position: absolute;
        top: var(--shell-inset-y);
        right: var(--shell-inset-x);
        bottom: var(--shell-inset-y);
        left: var(--shell-inset-x);
        border: var(--shell-border) solid var(--inner-border);
        background: var(--inner-color);
        border-radius: var(--inner-radius);
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .qr-panel {
        position: absolute;
        top: var(--panel-top);
        left: 50%;
        width: var(--panel-width);
        height: var(--panel-height);
        transform: translateX(-50%);
        background: #fff;
        border-radius: 2mm;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .qr-code {
        width: var(--qr-size);
        height: var(--qr-size);
      }

      .qr-code svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      @page {
        size: 54mm 300mm;
        margin: 0;
      }

      @media print {
        html,
        body {
          padding: 0;
          background: #fff;
        }

        .controls {
          display: none;
        }

        .sheet {
          display: block;
        }

        .sticker {
          margin: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <section class="controls">
      <h1>GAMA Baggage Sticker Print</h1>
      <p>
        Sticker size is fixed to <strong>54 mm x 300 mm</strong>. The center white
        QR block is fixed to <strong>53 mm x 68 mm</strong>
      </p>
      <p id="rangeNote"></p>
      <div class="options">
        <div class="field">
          <label for="startSequence">Start sequence</label>
          <input type="number" id="startSequence" min="1" max="99999999999" step="1" value="1">
        </div>
        <div class="field">
          <label for="endSequence">End sequence</label>
          <input type="number" id="endSequence" min="1" max="99999999999" step="1" value="100">
        </div>
        <div class="field">
          <label for="innerColor">Body color</label>
          <select id="innerColor">
            <option value="#ef0707" selected>Red</option>
            <option value="#f57c00">Orange</option>
            <option value="#f2c200">Yellow</option>
            <option value="#2e7d32">Green</option>
            <option value="#1565c0">Blue</option>
            <option value="#8e24aa">Purple</option>
            <option value="#ec407a">Pink</option>
            <option value="#00897b">Teal</option>
            <option value="#00acc1">Cyan</option>
            <option value="#7cb342">Lime</option>
            <option value="#5d4037">Brown</option>
            <option value="#fb8c00">Amber</option>
            <option value="#6d4c41">Coffee</option>
            <option value="#546e7a">Blue Grey</option>
            <option value="#283593">Indigo</option>
            <option value="#212121">Black</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <button type="button" id="fullButton">Load Selected Range</button>
        <button type="button" id="downloadPdfButton" class="secondary">Download PDF</button>
        <button type="button" id="printButton" class="secondary">Print Selected Range</button>
        <a class="button-link secondary" href="center-qr.html">Center QR Page</a>
      </div>
      <div class="status" id="status"></div>
    </section>

    <main class="sheet" id="sheet"></main>

    <template id="stickerTemplate">
      <section class="sticker">
        <div class="sticker-shell">
          <div class="qr-panel">
            <div class="qr-code" aria-hidden="true"></div>
          </div>
        </div>
      </section>
    </template>

    <script src="qrcode.min.js"></script>
    <script>
      const PREFIX = "G";
      const MIN_SEQUENCE = 1;
      const MAX_SEQUENCE = 99999999999;
      const SEQUENCE_DIGITS = 11;
      const DEFAULT_START_SEQUENCE = 1;
      const DEFAULT_END_SEQUENCE = 100;
      const RENDER_BATCH_SIZE = 100;
      const STORAGE_KEY = "gama-sticker-print-settings";
      const MM_TO_PT = 72 / 25.4;
      const PDF_LAYOUT = {
        labelWidth: 54,
        labelHeight: 300,
        shellInsetX: 0.25,
        shellInsetY: 1.8,
        shellBorder: 0.25,
        outerRadius: 2.5,
        innerRadius: 2.1,
        panelWidth: 50,
        panelHeight: 56,
        panelTop: 110,
        panelRadius: 2,
        qrSize: 44,
        outerColor: "#f6f4aa",
        innerBorder: "#17305a",
      };

      const sheet = document.getElementById("sheet");
      const template = document.getElementById("stickerTemplate");
      const status = document.getElementById("status");
      const rangeNote = document.getElementById("rangeNote");
      const startInput = document.getElementById("startSequence");
      const endInput = document.getElementById("endSequence");
      const innerColorInput = document.getElementById("innerColor");
      const downloadPdfButton = document.getElementById("downloadPdfButton");

      function formatCode(sequence) {
        return `${PREFIX}${String(sequence).padStart(SEQUENCE_DIGITS, "0")}`;
      }

      function parseSequence(value, fallback) {
        const parsed = Number.parseInt(value, 10);
        if (Number.isNaN(parsed) || parsed < MIN_SEQUENCE) {
          return fallback;
        }

        return Math.min(MAX_SEQUENCE, parsed);
      }

      function getSelectedRange() {
        const startSequence = parseSequence(startInput.value, DEFAULT_START_SEQUENCE);
        const endSequence = parseSequence(endInput.value, DEFAULT_END_SEQUENCE);

        startInput.value = startSequence;
        endInput.value = endSequence;

        if (startSequence > endSequence) {
          throw new Error("Start sequence must be less than or equal to end sequence.");
        }

        return {
          startSequence,
          endSequence,
          count: endSequence - startSequence + 1,
        };
      }

      function applyColors() {
        document.documentElement.style.setProperty("--inner-color", innerColorInput.value);
      }

      function saveSettings() {
        const payload = {
          startSequence: startInput.value,
          endSequence: endInput.value,
          innerColor: innerColorInput.value,
        };

        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      }

      function restoreSettings() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return;
        }

        try {
          const saved = JSON.parse(raw);

          if (saved.startSequence) {
            startInput.value = saved.startSequence;
          }

          if (saved.endSequence) {
            endInput.value = saved.endSequence;
          }

          if (saved.innerColor) {
            const optionExists = Array.from(innerColorInput.options).some(
              (option) => option.value === saved.innerColor
            );

            if (optionExists) {
              innerColorInput.value = saved.innerColor;
            }
          }
        } catch (error) {
          localStorage.removeItem(STORAGE_KEY);
        }
      }

      function updateRangeNote() {
        try {
          const range = getSelectedRange();
          rangeNote.textContent =
            `Allowed range: ${formatCode(MIN_SEQUENCE)} to ${formatCode(MAX_SEQUENCE)}. ` +
            `Selected range: ${formatCode(range.startSequence)} to ${formatCode(range.endSequence)} ` +
            `(${range.count.toLocaleString()} stickers).`;
        } catch (error) {
          rangeNote.textContent =
            `Allowed range: ${formatCode(MIN_SEQUENCE)} to ${formatCode(MAX_SEQUENCE)}. ${error.message}`;
        }
      }

      function createQrMarkup(code) {
        const qr = qrcode(0, "M");
        qr.addData(code, "Byte");
        qr.make();
        return qr.createSvgTag({
          cellSize: 4,
          margin: 0,
          scalable: true,
          alt: { text: code },
        });
      }

      function makeSticker(code) {
        const fragment = template.content.cloneNode(true);
        const qrCode = fragment.querySelector(".qr-code");
        qrCode.innerHTML = createQrMarkup(code);

        return fragment;
      }

      function mm(value) {
        return value * MM_TO_PT;
      }

      function pdfNumber(value) {
        return Number(value.toFixed(3)).toString();
      }

      function pdfPoint(value) {
        return pdfNumber(mm(value));
      }

      function hexToRgb(hex) {
        const normalized = hex.replace("#", "");
        return [
          Number.parseInt(normalized.slice(0, 2), 16) / 255,
          Number.parseInt(normalized.slice(2, 4), 16) / 255,
          Number.parseInt(normalized.slice(4, 6), 16) / 255,
        ];
      }

      function pdfColor(hex, operator) {
        return `${hexToRgb(hex).map(pdfNumber).join(" ")} ${operator}`;
      }

      function pdfRoundedRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        const c = r * 0.5522847498;
        const right = x + width;
        const bottom = y + height;

        return [
          `${pdfPoint(x + r)} ${pdfPoint(y)} m`,
          `${pdfPoint(right - r)} ${pdfPoint(y)} l`,
          `${pdfPoint(right - r + c)} ${pdfPoint(y)} ${pdfPoint(right)} ${pdfPoint(y + r - c)} ${pdfPoint(right)} ${pdfPoint(y + r)} c`,
          `${pdfPoint(right)} ${pdfPoint(bottom - r)} l`,
          `${pdfPoint(right)} ${pdfPoint(bottom - r + c)} ${pdfPoint(right - r + c)} ${pdfPoint(bottom)} ${pdfPoint(right - r)} ${pdfPoint(bottom)} c`,
          `${pdfPoint(x + r)} ${pdfPoint(bottom)} l`,
          `${pdfPoint(x + r - c)} ${pdfPoint(bottom)} ${pdfPoint(x)} ${pdfPoint(bottom - r + c)} ${pdfPoint(x)} ${pdfPoint(bottom - r)} c`,
          `${pdfPoint(x)} ${pdfPoint(y + r)} l`,
          `${pdfPoint(x)} ${pdfPoint(y + r - c)} ${pdfPoint(x + r - c)} ${pdfPoint(y)} ${pdfPoint(x + r)} ${pdfPoint(y)} c`,
          "h",
        ].join("\n");
      }

      function createQrMatrix(code) {
        const qr = qrcode(0, "M");
        qr.addData(code, "Byte");
        qr.make();

        return {
          size: qr.getModuleCount(),
          isDark: (row, column) => qr.isDark(row, column),
        };
      }

      function createStickerPdfPage(code) {
        const layout = PDF_LAYOUT;
        const pageHeight = pdfPoint(layout.labelHeight);
        const qr = createQrMatrix(code);
        const qrModuleSize = layout.qrSize / qr.size;
        const qrX = (layout.labelWidth - layout.qrSize) / 2;
        const qrY = layout.panelTop + (layout.panelHeight - layout.qrSize) / 2;
        const panelX = (layout.labelWidth - layout.panelWidth) / 2;
        const innerColor = innerColorInput.value;
        const commands = [
          "q",
          `1 0 0 -1 0 ${pageHeight} cm`,
          pdfColor(layout.outerColor, "rg"),
          pdfRoundedRect(0, 0, layout.labelWidth, layout.labelHeight, layout.outerRadius),
          "f",
          pdfColor(innerColor, "rg"),
          pdfColor(layout.innerBorder, "RG"),
          `${pdfPoint(layout.shellBorder)} w`,
          pdfRoundedRect(
            layout.shellInsetX,
            layout.shellInsetY,
            layout.labelWidth - layout.shellInsetX * 2,
            layout.labelHeight - layout.shellInsetY * 2,
            layout.innerRadius
          ),
          "B",
          pdfColor("#ffffff", "rg"),
          pdfRoundedRect(panelX, layout.panelTop, layout.panelWidth, layout.panelHeight, layout.panelRadius),
          "f",
          pdfColor("#000000", "rg"),
        ];

        for (let row = 0; row < qr.size; row += 1) {
          for (let column = 0; column < qr.size; column += 1) {
            if (qr.isDark(row, column)) {
              commands.push(
                `${pdfPoint(qrX + column * qrModuleSize)} ${pdfPoint(qrY + row * qrModuleSize)} ` +
                `${pdfPoint(qrModuleSize)} ${pdfPoint(qrModuleSize)} re`
              );
            }
          }
        }

        commands.push("f", "Q");

        return commands.join("\n");
      }

      function createPdfDocument(pageContents) {
        const pageWidth = pdfPoint(PDF_LAYOUT.labelWidth);
        const pageHeight = pdfPoint(PDF_LAYOUT.labelHeight);
        const objectCount = 2 + pageContents.length * 2;
        const objects = new Array(objectCount + 1);
        const pageRefs = pageContents
          .map((_, index) => `${3 + index * 2} 0 R`)
          .join(" ");

        objects[1] = "<< /Type /Catalog /Pages 2 0 R >>";
        objects[2] = `<< /Type /Pages /Kids [${pageRefs}] /Count ${pageContents.length} >>`;

        pageContents.forEach((content, index) => {
          const pageObjectId = 3 + index * 2;
          const contentObjectId = pageObjectId + 1;
          objects[pageObjectId] =
            `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageWidth} ${pageHeight}] /Contents ${contentObjectId} 0 R >>`;
          objects[contentObjectId] =
            `<< /Length ${content.length} >>\nstream\n${content}\nendstream`;
        });

        let pdf = "%PDF-1.4\n";
        const offsets = [0];

        for (let objectId = 1; objectId < objects.length; objectId += 1) {
          offsets[objectId] = pdf.length;
          pdf += `${objectId} 0 obj\n${objects[objectId]}\nendobj\n`;
        }

        const xrefOffset = pdf.length;
        pdf += `xref\n0 ${objects.length}\n`;
        pdf += "0000000000 65535 f \n";

        for (let objectId = 1; objectId < objects.length; objectId += 1) {
          pdf += `${String(offsets[objectId]).padStart(10, "0")} 00000 n \n`;
        }

        pdf +=
          `trailer\n<< /Size ${objects.length} /Root 1 0 R >>\n` +
          `startxref\n${xrefOffset}\n%%EOF`;

        return new Blob([pdf], { type: "application/pdf" });
      }

      function downloadBlob(blob, fileName) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 0);
      }

      async function buildLabels(startSequence, endSequence, limit = null) {
        sheet.innerHTML = "";
        const totalInRange = endSequence - startSequence + 1;
        const stickerLimit = limit === null ? totalInRange : Math.min(limit, totalInRange);
        status.textContent = `Building ${stickerLimit.toLocaleString()} sticker(s)...`;
        const finalSequence = startSequence + stickerLimit - 1;

        for (let batchStart = startSequence; batchStart <= finalSequence; batchStart += RENDER_BATCH_SIZE) {
          const fragment = document.createDocumentFragment();
          const batchEnd = Math.min(finalSequence, batchStart + RENDER_BATCH_SIZE - 1);

          for (let sequence = batchStart; sequence <= batchEnd; sequence += 1) {
            fragment.appendChild(makeSticker(formatCode(sequence)));
          }

          sheet.appendChild(fragment);
          status.textContent =
            `Building ${stickerLimit.toLocaleString()} sticker(s)... ` +
            `${(batchEnd - startSequence + 1).toLocaleString()} complete.`;

          await new Promise((resolve) => requestAnimationFrame(resolve));
        }

        status.textContent =
          `Loaded ${stickerLimit.toLocaleString()} sticker(s): ` +
          `${formatCode(startSequence)} to ${formatCode(finalSequence)}.`;
      }

      async function buildSelectedRange() {
        const range = getSelectedRange();
        await buildLabels(range.startSequence, range.endSequence);
      }

      async function buildSelectedRangeAndPrint() {
        const range = getSelectedRange();
        await buildLabels(range.startSequence, range.endSequence);
        status.textContent =
          `Loaded ${range.count.toLocaleString()} sticker(s). Opening print dialog...`;
        window.print();
      }

      async function downloadSelectedRangeAsPdf() {
        const range = getSelectedRange();
        const pageContents = [];
        const fileName =
          `gama-stickers-${formatCode(range.startSequence)}-${formatCode(range.endSequence)}.pdf`;

        downloadPdfButton.disabled = true;
        status.textContent = `Generating PDF for ${range.count.toLocaleString()} sticker(s)...`;

        try {
          for (let sequence = range.startSequence; sequence <= range.endSequence; sequence += 1) {
            pageContents.push(createStickerPdfPage(formatCode(sequence)));

            if (
              (sequence - range.startSequence + 1) % RENDER_BATCH_SIZE === 0 ||
              sequence === range.endSequence
            ) {
              status.textContent =
                `Generating PDF for ${range.count.toLocaleString()} sticker(s)... ` +
                `${(sequence - range.startSequence + 1).toLocaleString()} complete.`;
              await new Promise((resolve) => requestAnimationFrame(resolve));
            }
          }

          downloadBlob(createPdfDocument(pageContents), fileName);
          status.textContent = `Downloaded ${fileName}.`;
        } finally {
          downloadPdfButton.disabled = false;
        }
      }

      document.getElementById("fullButton").addEventListener("click", () => {
        buildSelectedRange().catch((error) => {
          status.textContent = error.message;
        });
      });

      document.getElementById("printButton").addEventListener("click", () => {
        buildSelectedRangeAndPrint().catch((error) => {
          status.textContent = error.message;
        });
      });

      downloadPdfButton.addEventListener("click", () => {
        downloadSelectedRangeAsPdf().catch((error) => {
          status.textContent = error.message;
          downloadPdfButton.disabled = false;
        });
      });

      [startInput, endInput].forEach((input) => {
        input.addEventListener("input", updateRangeNote);
        input.addEventListener("change", updateRangeNote);
        input.addEventListener("change", saveSettings);
      });

      innerColorInput.addEventListener("change", () => {
        applyColors();
        saveSettings();
      });

      restoreSettings();
      applyColors();
      updateRangeNote();
    </script>
  </body>
</html>
